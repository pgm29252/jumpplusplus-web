version: "3.9"
services:
  backend:
    image: jumpplusplus/backend:latest
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - jumpplusplus-net
    deploy:
      restart_policy:
        condition: on-failure

  frontend:
    image: jumpplusplus/frontend:latest
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - jumpplusplus-net
    deploy:
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx:1.27-alpine
    ports:
      - published: 80
        target: 80
      - published: 443
        target: 443
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
        mode: 0444
    networks:
      - jumpplusplus-net
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  backend_uploads:

networks:
  jumpplusplus-net:

configs:
  nginx_conf:
    file: ./nginx/nginx.conf
